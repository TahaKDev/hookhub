    - generic [ref=e1201]:
      - generic [ref=e1203]:
        - heading "Nous prenons à coeur de protéger vos données" [level=2] [ref=e1204]
        - generic [ref=e1205]:
          - text: Notre organisation, nos
          - link "affiliés" [ref=e1206] [cursor=pointer]:
            - /url: https://www.cnn.com/affiliates
          - text: ", et ses 60 partenaires stockons et accédons à des données personnelles, telles que des données de navigation ou des identifiants uniques, sur votre appareil. Si vous sélectionnez \"J'accepte\", les technologies de suivi prendront en charge les finalités affichées dans la section \"Nous et nos partenaires traitons des données pour fournir\". Si vous choisissez \"Cookies essentiels uniquement\" ou que vous retirez votre consentement, elles seront désactivées. Si les technologies de suivi sont désactivées, il est possible que certains contenus et annonces qui vous sont présentés ne soient pas pertinents pour vous. Vous pouvez faire réapparaître ce menu pour modifier vos choix ou pour retirer votre consentement à tout moment en cliquant sur le lien \"Gérer les cookies+\" en bas de la page web. Les choix que vous avez fait aurons un effet sur notre ou nos site web et nos applications. Pour plus d’informations, reportez-vous à notre"
          - link "politique de confidentialité" [ref=e1207] [cursor=pointer]:
            - /url: “https://www.cnn.com/privacy”
          - text: .
        - generic [ref=e1208]:
          - heading "Nos équipes ainsi que nos partenaires externes, traitent des données selon les finalités suivantes :" [level=3] [ref=e1209]
          - paragraph [ref=e1211]:
            - text: Stocker et/ou accéder à des informations sur un appareil. Utiliser des données limitées pour sélectionner la publicité. Utiliser des profils pour sélectionner des publicités personnalisées. Créer des profils pour la publicité personnalisée. Utiliser des profils pour sélectionner des contenus personnalisés. Créer des profils de contenus personnalisés. Mesurer la performance des publicités. Mesurer la performance des contenus. Comprendre les publics par le biais de statistiques ou de combinaisons de données provenant de différentes sources. Développer et améliorer les services.
            - button "Liste de nos partenaires (fournisseurs)" [ref=e1212] [cursor=pointer]
